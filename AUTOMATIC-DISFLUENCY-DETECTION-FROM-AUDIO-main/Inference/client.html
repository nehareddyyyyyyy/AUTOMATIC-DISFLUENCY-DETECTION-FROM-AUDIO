<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disfluency Visualizer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            background: white;
        }
        h1 { margin-bottom: 1.5rem; color: #2c3e50; }
        input[type="file"] {
            margin-bottom: 1.5rem;
            width: 100%;
            padding: 10px;
            border: 2px dashed #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        button {
            padding: 12px 24px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            flex: 1;
            transition: background 0.3s;
        }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        button.secondary {
            background-color: #2ecc71;
            display: none;
        }
        button.secondary:hover { background-color: #27ae60; }

        #chart-container {
            margin-top: 2rem;
            width: 90%;
            max-width: 800px;
            display: none;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .status {
            margin-bottom: 1rem;
            font-size: 0.9rem;
            font-weight: bold;
            color: #7f8c8d;
        }
        .record-section {
            margin-top: 1.5rem;
            text-align: left;
        }
        .record-section h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1rem;
            color: #2c3e50;
        }
        .record-section .btn-group { margin-bottom: 0.5rem; }
        .record-section .btn-group button {
            padding: 8px 16px;
            font-size: 14px;
        }
        #recordStatus {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin: 0.5rem 0;
        }
        #recordedAudio { width: 100%; margin-top: 10px; }
        #analyzeBtn.ready { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(52, 152, 219, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Disfluency Detection</h1>
        <div class="status" id="status-indicator">● Connecting...</div>

        <!-- File upload -->
        <input type="file" id="audioInput" accept=".mp3,.wav,.webm,audio/mpeg,audio/wav,audio/webm">

        <!-- Recording section -->
        <div class="record-section">
            <h3>Record Audio Now</h3>
            <div class="btn-group">
                <button type="button" id="startRecordBtn">🎙️ Start Recording</button>
                <button type="button" id="stopRecordBtn" disabled>⏹️ Stop</button>
            </div>
            <p id="recordStatus">Not recording</p>
            <audio id="recordedAudio" controls style="display:none; margin-top:10px;"></audio>
            <button type="button" id="downloadRecordingBtn" style="display:none; margin-top:8px; padding:8px 16px; font-size:14px;">
    Download Recording
</button>

        </div>

        <div class="btn-group" style="margin-top: 1.5rem;">
            <button id="analyzeBtn" disabled>Waiting for Server...</button>
            <button id="downloadBtn" class="secondary">Download CSV</button>
        </div>
    </div>

    <div id="chart-container">
        <h3 style="text-align:center;">Disfluency Timeline</h3>
        <canvas id="myLineChart"></canvas>
    </div>

    <script>
        const analyzeBtn = document.getElementById('analyzeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const audioInput = document.getElementById('audioInput');
        const chartContainer = document.getElementById('chart-container');
        const statusIndicator = document.getElementById('status-indicator');

        const startRecordBtn = document.getElementById('startRecordBtn');
        const stopRecordBtn = document.getElementById('stopRecordBtn');
        const recordStatus = document.getElementById('recordStatus');
        const recordedAudioEl = document.getElementById('recordedAudio');
        const downloadRecordingBtn = document.getElementById('downloadRecordingBtn');

        let myChart = null;
        let csvContent = "";
        let mediaRecorder = null;
        let audioChunks = [];
        let recordedFile = null;

        // ---- server health polling ----
        checkServer();
        setInterval(checkServer, 2000);

        async function checkServer() {
            try {
                const res = await fetch('/health?t=' + Date.now(), {
                    method: 'GET',
                    headers: { 'Cache-Control': 'no-cache' },
                    cache: 'no-store'
                });
                if (!res.ok) throw new Error();
                setOnlineState();
            } catch {
                setOfflineState();
            }
        }

        function setOnlineState() {
            if (statusIndicator.textContent === "● Server Online") return;
            statusIndicator.textContent = "● Server Online";
            statusIndicator.style.color = "#27ae60";
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = "Analyze Audio";
            analyzeBtn.style.backgroundColor = "#3498db";
        }

        function setOfflineState() {
            statusIndicator.textContent = "● Server Offline";
            statusIndicator.style.color = "#c0392b";
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = "Server Disconnected";
            analyzeBtn.style.backgroundColor = "#bdc3c7";
        }

        // ---- recording ----
        async function initRecorder() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            let options = {};
            if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
                options.mimeType = 'audio/webm;codecs=opus';
            } else if (MediaRecorder.isTypeSupported('audio/webm')) {
                options.mimeType = 'audio/webm';
            }

            mediaRecorder = new MediaRecorder(stream, options);

            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) audioChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                if (!audioChunks.length) {
                    recordStatus.textContent = "No audio captured. Try again.";
                    return;
                }

                const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || "audio/webm" });
                audioChunks = [];

                const url = URL.createObjectURL(blob);
                recordedAudioEl.pause();
                recordedAudioEl.removeAttribute('srcObject');
                recordedAudioEl.src = url;
                recordedAudioEl.style.display = "block";
                recordedAudioEl.load();
                recordedAudioEl.currentTime = 0;
                recordedAudioEl.volume = 1.0; // you press ▶ yourself

                recordedFile = new File([blob], "recording.webm", {
                    type: mediaRecorder.mimeType || "audio/webm"
                });

                // show download button
                downloadRecordingBtn.style.display = "inline-block";

                // Show ready message and highlight analyze button
                recordStatus.textContent = "✓ Recording ready. Click 'Analyze Audio' to process.";
                recordStatus.style.color = "#27ae60";
                analyzeBtn.classList.add('ready');
            };
        }

        startRecordBtn.addEventListener('click', async () => {
            try {
                if (!mediaRecorder) await initRecorder();
                audioChunks = [];
                recordedFile = null;
                mediaRecorder.start();
                recordStatus.textContent = "Recording... speak now.";
                startRecordBtn.disabled = true;
                stopRecordBtn.disabled = false;
            } catch (err) {
                console.error(err);
                alert("Cannot start recording. Please allow microphone access.");
                recordStatus.textContent = "Unable to access microphone.";
            }
        });

        stopRecordBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                recordStatus.textContent = "Processing recording...";
                startRecordBtn.disabled = false;
                stopRecordBtn.disabled = true;
            }
        });
        downloadRecordingBtn.addEventListener('click', () => {
    if (!recordedFile) return;
    const url = URL.createObjectURL(recordedFile);
    const a = document.createElement('a');
    a.href = url;
    a.download = recordedFile.name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
});


        // ---- analysis ----
        analyzeBtn.addEventListener('click', async () => {
            let file = audioInput.files[0] || recordedFile;
            if (!file) {
                alert("Please select an audio file or record one.");
                return;
            }

            analyzeBtn.classList.remove('ready');
            analyzeBtn.textContent = "Processing...";
            analyzeBtn.disabled = true;
            downloadBtn.style.display = 'none';
            chartContainer.style.display = 'none';

            try {
                await analyzeFile(file);
            } catch (err) {
                alert("Error: " + err.message);
                console.error(err);
            } finally {
                analyzeBtn.textContent = "Analyze Audio";
                analyzeBtn.disabled = false;
            }
        });

        async function analyzeFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            const response = await fetch('/predict', { method: 'POST', body: formData });
            let data;
            try {
                data = await response.json();
            } catch {
                throw new Error("Unable to parse server response.");
            }

            if (!response.ok || data.status === "error") {
                throw new Error(data.message || "Analysis failed.");
            }

            csvContent = data.csv_content;
            downloadBtn.style.display = 'block';

            const times = data.results.map(r => r.frame_time);
            const fp = data.results.map(r => r.FP);
            const rp = data.results.map(r => r.RP);
            const rv = data.results.map(r => r.RV);
            const rs = data.results.map(r => r.RS);
            const pw = data.results.map(r => r.PW);

            renderLineChart(times, fp, rp, rv, rs, pw);
        }

        // ---- CSV download ----
        downloadBtn.addEventListener('click', () => {
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'disfluency_results.csv';
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        // ---- chart ----
        function renderLineChart(times, fp, rp, rv, rs, pw) {
            chartContainer.style.display = 'block';
            const ctx = document.getElementById('myLineChart').getContext('2d');

            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: times,
                    datasets: [
                        { label: 'Filled Pause (FP)', data: fp, borderColor: '#FF6384', backgroundColor: '#FF6384', tension: 0.1, fill: false },
                        { label: 'Repetition (RP)', data: rp, borderColor: '#36A2EB', backgroundColor: '#36A2EB', tension: 0.1, fill: false },
                        { label: 'Revision (RV)', data: rv, borderColor: '#FFCE56', backgroundColor: '#FFCE56', tension: 0.1, fill: false },
                        { label: 'Restart (RS)', data: rs, borderColor: '#4BC0C0', backgroundColor: '#4BC0C0', tension: 0.1, fill: false },
                        { label: 'Partial Word (PW)', data: pw, borderColor: '#9966FF', backgroundColor: '#9966FF', tension: 0.1, fill: false }
                    ]
                },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        x: { title: { display: true, text: 'Time (seconds)' } },
                        y: { title: { display: true, text: 'Detected (0/1)' }, ticks: { stepSize: 1 } }
                    },
                    elements: { point: { radius: 0 } }
                }
            });
        }
    </script>
</body>
</html>
